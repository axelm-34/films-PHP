<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Super Site de Films</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #141414; color: white; margin: 0; padding: 20px; text-align: center; }
        
        /* Boutons de navigation */
        .nav-btn { background-color: #333; color: white; border: none; padding: 10px 20px; margin: 10px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        .nav-btn:hover { background-color: #e50914; }

        /* La grille des films */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { width: 200px; background-color: #222; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: scale(1.05); border: 2px solid #e50914; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card h3 { font-size: 1rem; margin: 10px; }

        /* Le style de la fenêtre modale (Pop-up) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: #222; margin: 10% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 600px; text-align: left; position: relative; display: flex; gap: 20px; }
        .modal-content img { width: 200px; border-radius: 8px; }
        .close-btn { color: #aaa; position: absolute; top: 10px; right: 20px; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: white; }
        .movie-info h2 { margin-top: 0; color: #e50914; }
        .badge { background-color: #e50914; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-right: 10px; }
        .fav-btn { background-color: #f5c518; color: black; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .fav-btn:hover { background-color: #d4a715; }
    </style>
</head>
<body>

    <h1> Mon Cinéma</h1>
    
    <div>
        <button class="nav-btn" onclick="loadMovies()"> Films Populaires</button>
        <button class="nav-btn" onclick="loadFavorites()"> Mes Favoris</button>
    </div>

    <h2 id="section-title">Films Populaires</h2>
    <div class="grid" id="movies-container">
        <p>Chargement des films...</p>
    </div>

    <div style="text-align: center;">
        <button id="load-more-btn" class="nav-btn" onclick="loadMoreMovies()" style="display: none; margin-top: 20px;">➕ Charger plus</button>
    </div>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" alt="Affiche">
            <div class="movie-info">
                <h2 id="modal-title">Titre du film</h2>
                <p><span class="badge" id="modal-rating"> 0/10</span> <span id="modal-date">Date</span></p>
                <p id="modal-desc">Description...</p>
                <button class="fav-btn" onclick="addToFavorites()"> Ajouter aux favoris</button>
            </div>
        </div>
    </div>

    <script>
        let allMovies = []; 
        let currentSelectedMovieId = null; 
        let currentPage = 1; // On commence à la page 1

        // 1. Charger la première page des films populaires
        async function loadMovies() {
            currentPage = 1; // On réinitialise la page à 1
            document.getElementById('section-title').innerText = "Films Populaires";
            document.getElementById('load-more-btn').style.display = 'inline-block'; // On affiche le bouton
            
            try {
                const response = await fetch(`http://localhost:8000/movies?type=popular&page=${currentPage}`);
                const data = await response.json();
                allMovies = data.results; 
                displayGrid(allMovies);
            } catch (error) {
                document.getElementById('movies-container').innerHTML = '<p style="color:red;">Erreur de connexion.</p>';
            }
        }

        // 2. NOUVELLE FONCTION : Charger la page suivante
        async function loadMoreMovies() {
            currentPage++; // On passe à la page 2, puis 3, etc.
            try {
                const response = await fetch(`http://localhost:8000/movies?type=popular&page=${currentPage}`);
                const data = await response.json();
                
                // On ajoute les nouveaux films à notre liste globale pour la modale
                allMovies = allMovies.concat(data.results);
                
                // On injecte seulement les nouvelles cartes HTML à la suite des autres
                const container = document.getElementById('movies-container');
                data.results.forEach(movie => {
                    const posterUrl = movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : 'https://via.placeholder.com/500x750?text=Pas+d\'affiche';
                    container.innerHTML += `
                        <div class="card" onclick="showDetails(${movie.id})">
                            <img src="${posterUrl}" alt="${movie.title}">
                            <h3>${movie.title}</h3>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Erreur lors du chargement de la suite:', error);
            }
        }

        // 3. Charger les favoris
        async function loadFavorites() {
            document.getElementById('section-title').innerText = "Mes Favoris";
            document.getElementById('load-more-btn').style.display = 'none'; // On cache le bouton "Charger plus" ici
            document.getElementById('movies-container').innerHTML = '<p>Chargement de tes favoris...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/favorites');
                const data = await response.json();
                allMovies = data; 
                
                if (data.length === 0) {
                    document.getElementById('movies-container').innerHTML = '<p>Tu n\'as pas encore de favoris.</p>';
                } else {
                    displayGrid(allMovies);
                }
            } catch (error) {
                document.getElementById('movies-container').innerHTML = '<p style="color:red;">Erreur de connexion.</p>';
            }
        }

        // Fonction pour dessiner la grille (utilisée par loadMovies et loadFavorites)
        function displayGrid(movies) {
            const container = document.getElementById('movies-container');
            container.innerHTML = ''; 
            movies.forEach(movie => {
                const posterUrl = movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : 'https://via.placeholder.com/500x750?text=Pas+d\'affiche';
                container.innerHTML += `
                    <div class="card" onclick="showDetails(${movie.id})">
                        <img src="${posterUrl}" alt="${movie.title}">
                        <h3>${movie.title}</h3>
                    </div>
                `;
            });
        }

        // Ajouter aux favoris
        async function addToFavorites() {
            if (!currentSelectedMovieId) return;
            try {
                const response = await fetch('http://localhost:8000/favorites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentSelectedMovieId })
                });
                const result = await response.json();
                if (result.success) alert('Film ajouté aux favoris avec succès !');
                else alert('Erreur lors de l\'ajout.');
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // Gestion de la modale
        function showDetails(movieId) {
            currentSelectedMovieId = movieId; 
            const movie = allMovies.find(m => m.id === movieId);
            if (movie) {
                document.getElementById('modal-title').innerText = movie.title;
                document.getElementById('modal-desc').innerText = movie.overview || "Aucun synopsis disponible.";
                document.getElementById('modal-rating').innerText = ` ${Math.round(movie.vote_average * 10) / 10}/10`;
                document.getElementById('modal-date').innerText = `Sortie : ${movie.release_date}`;
                const posterUrl = movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : 'https://via.placeholder.com/500x750?text=Pas+d\'affiche';
                document.getElementById('modal-img').src = posterUrl;
                document.getElementById('movie-modal').style.display = 'block';
            }
        }

        function closeModal() { document.getElementById('movie-modal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target === document.getElementById('movie-modal')) closeModal(); }

        // Lancement initial
        loadMovies();
    </script>
</body>
</html>
